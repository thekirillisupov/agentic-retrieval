# CKR eval with ai-sage/Giga-Embeddings-instruct as the embedder (v2 prompt:
# search + get_neighbours). Same recipe as configs/ckr.yaml, swapped embedder.
#
# Giga-Embeddings-instruct (https://huggingface.co/ai-sage/Giga-Embeddings-instruct)
# is a GigaChat-3b-based decoder embedder with a learned latent-attention
# pooling head — it does its own pooling internally (see tool_server/embedder.py
# pooling="latent_attention") and requires trust_remote_code=True. It has a
# hard 4096-token input limit and is instruction-tuned mainly for Russian.
# Only the query side gets an instruction prefix; passages get none.
#
# Prereq: rebuild the ckr FAISS index with this embedder (dim changes 2560 -> 2048,
#         so it cannot reuse indexes/qwen3/ckr_index/):
#   CUDA_VISIBLE_DEVICES=0 .venv/bin/python -m indexing.build_index \
#     --config configs/ckr_giga.yaml \
#     --corpus indexes/ckr_index/metadata.jsonl \
#     --out-dir indexes/giga/ckr_index \
#     --batch-size 16
#         GPUS=0 CONFIG=configs/ckr_giga.yaml bash scripts/serve_tool.sh
#         bash scripts/export_ckr_eval.sh   # grpo_val.parquet -> eval.jsonl (already present)
# Run:    CONFIG=configs/ckr_giga.yaml OUT_DIR=data/processed/ckr_giga \
#           MODEL_NAME=checkpoints/hf_model_360_steps bash scripts/run_eval.sh
model:
  name: Qwen/Qwen3.5-35B-A3B
  vllm_url: http://localhost:8000/v1
  api_key: EMPTY
  max_tokens: 4096
  temperature: 0.6
  #tokenizer_path: checkpoints/quantized/qwen3_5_35b_a3b_w8a8

tool_server:
  url: http://localhost:8100
  timeout_s: 30
  host: 0.0.0.0
  port: 8100

embedder:
  name: ai-sage/Giga-Embeddings-instruct
  dim: 2048
  device: cuda:0
  batch_size: 16
  max_length: 4096
  pooling: "latent_attention"
  trust_remote_code: true
  # flash_attention_2 needs the `flash-attn` package built against this env's
  # torch/CUDA; omit attn_implementation to fall back to eager/sdpa attention.
  dtype: "bfloat16"
  query_prefix: "Instruct: Given a search query, retrieve relevant passages that answer the query\nQuery: "
  passage_prefix: ""

index:
  top_k_default: 8
  top_k_max: 50
  use_gpu: false
  cache_size: 10000
  default_source: ckr
  sources:
    ckr:
      dir: ./indexes/giga/ckr_index/

reranker:
  enable: false
  url: http://localhost:8200/v1/rerank
  model: Qwen/Qwen3-Reranker-4B
  candidates: 8
  timeout_s: 30

agent:
  max_turns: 8
  max_tool_calls: 3
  prompt_version: v2
  # Replace doc_ids with small per-episode integers (0,1,2… by first
  # appearance) in tool output; the model answers with ints and the harness
  # maps them back to doc_ids for NDCG. Independent of prompt_version.
  use_id_map: true
  # Must match the training config's agent_loop.retrieval_react.tool_budget_feedback.
  tool_budget_feedback: true
  # Tool-response budgets — must match the training config's
  # rollout.multi_turn.max_tool_response_length / tool_response_truncate_side
  # (configs/gspo_qwen3_moe.yaml: 10240 / left), or eval shows the model
  # contexts it was never trained on.
  max_tool_response_length: 10240
  tool_response_truncate_side: left
  # Per-passage token cap (training used 512 via agent_loop.retrieval_react.
  # max_passage_tokens). Enabling requires model.tokenizer_path; 0 disables.
  max_passage_tokens: 0

eval:
  processed_dir: ./data/processed/ckr/
  eval_dataset_path: ./data/processed/ckr/eval.jsonl
  ndcg_k: 16

trajectories:
  output_dir: ./trajectories_data/
  ti_to_check_every_n: 20
