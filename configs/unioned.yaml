# SBOL + MuSiQue served as SEPARATE per-source indexes (no longer one merged
# index), so a MuSiQue query can never retrieve SBOL/rnd passages and vice versa.
# FAISS indexes run on CPU (faiss-gpu not available). Embedder uses GPU 0.
#   GPUS=0 CONFIG=configs/unioned.yaml bash scripts/serve_tool.sh
model:
  name: Qwen/Qwen3.5-35B-A3B
  vllm_url: http://localhost:8000/v1
  api_key: EMPTY
  max_tokens: 4096
  temperature: 0.6

tool_server:
  url: http://localhost:8100
  timeout_s: 30
  host: 0.0.0.0
  port: 8100

embedder:
  name: BAAI/bge-m3
  dim: 1024
  device: cuda:0
  batch_size: 32
  max_length: 8192
  query_prefix: ""
  passage_prefix: ""
  pooling: "cls"

index:
  top_k_default: 10
  top_k_max: 50
  use_gpu: false           # faiss-gpu is not available in this env; CPU search is <20ms at this scale
  cache_size: 10000
  # Source queried when a request omits `source` and the row carries none.
  default_source: musique
  # One FAISS index per source, each pinned to its own visible-device ordinal
  # (after CUDA_VISIBLE_DEVICES from scripts/serve_tool.sh). gpu_id is that
  # visible ordinal, not the physical GPU id.
  sources:
    musique:
      dir: ./indexes/musique/
    sbol:
      dir: ./indexes/sbol/
    # Source key is "rnd" (matches data_source "rnd_retrieval" -> "rnd"); the
    # FAISS index lives under indexes/rnd_index/.
    rnd:
      dir: ./indexes/rnd_index/
    ckr:
      dir: ./indexes/ckr_index/

agent:
  max_turns: 8
  max_tool_calls: 10
  prompt_version: v2

eval:
  processed_dir: ./data/processed/unioned/
  eval_dataset_path: ./data/processed/unioned/grpo_val.parquet

trajectories:
  output_dir: ./trajectories_data/
  ti_to_check_every_n: 20
