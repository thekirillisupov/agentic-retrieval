model:
  name: Qwen/Qwen3.5-35B-A3B
  vllm_url: http://localhost:8000/v1
  api_key: EMPTY
  max_tokens: 12000
  temperature: 0.1

tool_server:
  url: http://localhost:8100
  timeout_s: 30
  host: 0.0.0.0
  port: 8100

embedder:
  name: Qwen/Qwen3-Embedding-4B
  dim: 2560
  device: cuda:0
  batch_size: 32
  max_length: 8192
  pooling: "last"
  add_eos: true
  padding_side: "left"
  dtype: "float16"
  device_map: "auto"
  query_prefix: "Instruct: Given a search query, retrieve relevant passages that answer the query\nQuery:"
  passage_prefix: ""

index:
  top_k_default: 3
  top_k_max: 50
  use_gpu: false
  cache_size: 10000
  default_source: sbol
  sources:
    musique:
      dir: ./indexes/qwen3/musique/
    sbol:
      dir: ./indexes/qwen3/sbol/
    rnd:
      dir: ./indexes/qwen3/rnd_index/
    ckr:
      dir: ./indexes/qwen3/ckr_index/

agent:
  max_turns: 8
  max_tool_calls: 3
  prompt_version: v2_search_only
  # Replace doc_ids with small per-episode integers (0,1,2… by first
  # appearance) in tool output; the model answers with ints and the harness
  # maps them back to doc_ids for NDCG. Independent of prompt_version.
  use_id_map: true
  # Must match the training config's agent_loop.retrieval_react.tool_budget_feedback.
  tool_budget_feedback: true
  # Tool-response budgets — must match the training run's
  # rollout.multi_turn.max_tool_response_length / tool_response_truncate_side
  # and agent_loop.retrieval_react.max_passage_tokens, or eval shows the model
  # contexts it was never trained on. 0 = unlimited (legacy behaviour);
  # max_passage_tokens > 0 also requires model.tokenizer_path.
  max_tool_response_length: 0
  tool_response_truncate_side: left
  max_passage_tokens: 0

eval:
  raw_sbol_dir: ./data/raw/sbol/
  processed_dir: ./data/processed/sbol/
  eval_dataset_path: ./data/processed/sbol/eval.jsonl
  subset_size: 200
  budget_sweep: [1, 3, 5, 8]
  ndcg_k: 10

trajectories:
  output_dir: ./trajectories_data/
  ti_to_check_every_n: 20
