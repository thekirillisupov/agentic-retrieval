# SBOL + MuSiQue served as SEPARATE per-source indexes (no longer one merged
# index), so a MuSiQue query can never retrieve SBOL/rnd passages and vice versa.
# FAISS indexes run on CPU (faiss-gpu not available). Embedder uses GPU 0.
#   GPUS=0 CONFIG=configs/unioned.yaml bash scripts/serve_tool.sh
model:
  name: Qwen/Qwen3.5-35B-A3B
  vllm_url: http://localhost:8000/v1
  api_key: EMPTY
  max_tokens: 4096
  temperature: 0.6

tool_server:
  url: http://localhost:8100
  timeout_s: 30
  host: 0.0.0.0
  port: 8100

embedder:
  name: BAAI/bge-m3
  dim: 1024
  device: cuda:0
  batch_size: 32
  max_length: 8192
  query_prefix: ""
  passage_prefix: ""
  pooling: "cls"

index:
  top_k_default: 10
  top_k_max: 50
  use_gpu: false           # faiss-gpu is not available in this env; CPU search is <20ms at this scale
  cache_size: 10000
  # Source queried when a request omits `source` and the row carries none.
  default_source: musique
  # One FAISS index per source, each pinned to its own visible-device ordinal
  # (after CUDA_VISIBLE_DEVICES from scripts/serve_tool.sh). gpu_id is that
  # visible ordinal, not the physical GPU id.
  sources:
    musique:
      dir: ./indexes/musique/
    sbol:
      dir: ./indexes/sbol/
    # Source key is "rnd" (matches data_source "rnd_retrieval" -> "rnd"); the
    # FAISS index lives under indexes/qwen3/rnd_index/.
    rnd:
      dir: ./indexes/rnd_index/
    ckr:
      dir: ./indexes/ckr_index/

# Second-stage cross-encoder reranker. When enabled, /local_search pulls
# `candidates` FAISS hits and reranks them with Qwen3-Reranker-4B, returning the
# best `top_k`. The reranker is served separately by vLLM with TP=4 on the last
# 4 GPUs (scripts/serve_reranker.sh: GPUS=4,5,6,7), while the embedder shards
# across GPUs 0-3 (scripts/serve_tool.sh: GPUS=0,1,2,3). Fail-soft: a reranker
# error degrades to the raw FAISS order rather than failing the search.
reranker:
  # Disabled for now — search is embedding-only (FAISS over Qwen3-Embedding-4B).
  # Flip back to true (and start scripts/serve_reranker.sh) to re-enable the
  # second-stage cross-encoder rerank.
  enable: false
  url: http://localhost:8200/v1/rerank
  model: Qwen/Qwen3-Reranker-4B
  # FAISS candidate pool size handed to the reranker (>= the request's top_k).
  candidates: 8
  timeout_s: 30

agent:
  max_turns: 8
  max_tool_calls: 10
  prompt_version: v2
  # Replace doc_ids with small per-episode integers (0,1,2… by first
  # appearance) in tool output; the model answers with ints and the harness
  # maps them back to doc_ids for NDCG. Independent of prompt_version.
  use_id_map: false
  # Must match the training config's agent_loop.retrieval_react.tool_budget_feedback.
  tool_budget_feedback: false
  # Tool-response budgets — must match the training run's
  # rollout.multi_turn.max_tool_response_length / tool_response_truncate_side
  # and agent_loop.retrieval_react.max_passage_tokens, or eval shows the model
  # contexts it was never trained on. 0 = unlimited (legacy behaviour);
  # max_passage_tokens > 0 also requires model.tokenizer_path.
  max_tool_response_length: 0
  tool_response_truncate_side: left
  max_passage_tokens: 0

eval:
  processed_dir: ./data/processed/unioned/
  eval_dataset_path: ./data/processed/unioned/grpo_val.parquet

trajectories:
  output_dir: ./trajectories_data/
  ti_to_check_every_n: 20
