model:
  name: Qwen/Qwen3.5-35B-A3B
  vllm_url: http://localhost:8000/v1
  api_key: EMPTY
  max_tokens: 4096
  temperature: 0.6

tool_server:
  url: http://localhost:8100
  timeout_s: 30
  host: 0.0.0.0
  port: 8100

embedder:
  name: intfloat/e5-large-v2
  dim: 1024
  device: cuda:0
  batch_size: 64
  max_length: 512
  query_prefix: "query: "
  passage_prefix: "passage: "

index:
  dir: ./index/
  top_k_default: 10
  top_k_max: 50
  use_gpu: false
  gpu_id: 3
  cache_size: 10000

agent:
  max_turns: 8
  max_tool_calls: 10
  prompt_version: v1

eval:
  raw_musique_dir: ./data/raw/musique/
  processed_dir: ./data/processed/
  eval_dataset_path: ./data/processed/musique_dev_eval.jsonl
  subset_size: 200
  budget_sweep: [1, 3, 5, 8]
  ndcg_k: 10

trajectories:
  output_dir: ./trajectories_data/
  ti_to_check_every_n: 20
