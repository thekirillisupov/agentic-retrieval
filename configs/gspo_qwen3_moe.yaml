# GSPO config for the agentic-retrieval ReAct loop on MuSiQue, with the
# Qwen3.5-35B-A3B MoE actor.
#
# GSPO (Group Sequence Policy Optimization, Qwen team) keeps GRPO's
# group-relative advantages but swaps the PPO token-level importance ratio for a
# sequence-level ratio. That stabilises training of MoE policies where the
# top-k routing decisions make per-token ratios extremely noisy.
#
# Wiring vs. the official recipe (verl examples/gspo_trainer/run_qwen3_30b_a3b_megatron.sh):
#   * actor_rollout_ref.actor.policy_loss.loss_mode=gspo  — selects compute_policy_loss_gspo
#                                                           (verl/trainer/ppo/core_algos.py).
#   * actor.loss_agg_mode=seq-mean-token-mean             — GSPO aggregation.
#   * actor.clip_ratio_low/high=3e-4 / 4e-4               — sequence-level ratios are
#                                                           tight; do NOT reuse GRPO's 0.2.
#   * actor.clip_ratio_c=10.0                             — dual-clip safety guard.
#   * algorithm.adv_estimator=grpo                        — GSPO is a policy-loss swap
#                                                           on top of GRPO advantages.
#   * defaults: ppo_megatron_trainer                       — selects McoreActorConfig + Megatron EP/TP.
#
# Launch:
#   python -m verl.trainer.main_ppo --config-path configs --config-name gspo_qwen3_moe
# (see scripts/train_gspo.sh).

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_megatron_trainer
  - _self_

data:
  train_files: data/processed/unioned/grpo_train.parquet
  val_files: data/processed/unioned/grpo_val.parquet
  prompt_key: prompt
  reward_fn_key: data_source
  train_batch_size: 64
  val_batch_size: 64
  return_raw_chat: true
  shuffle: true
  truncation: error
  apply_chat_template_kwargs:
    enable_thinking: false

algorithm:
  adv_estimator: grpo                  # group-relative advantages (GSPO keeps these)
  norm_adv_by_std_in_grpo: false
  use_kl_in_reward: true
  kl_coef: 0.02
  gamma: 1.0
  lam: 1.0
  filter_groups:
    enable: true
    metric: score
    max_num_gen_batches: 0 # how many fresh dataloader batches you'll spend trying to assemble one update batch 
    # max_num_gen_batches * batch_size * rollouts_n
  # Group-relative, anchored tool-call penalty (Perplexity "Advancing
  # Search-Augmented Language Models"). For each GSPO group g, winners are
  # rollouts with reward == winner_threshold. A per-group baseline is sampled
  # b_g ~ Unif[min_{W_g} c, mean_{W_g} c]; excess delta_i = max(0, c_i - b_g);
  # p_i = 1 - exp(-delta_i); penalty = alpha_win*p_i for winners, else
  # alpha_lose*p_i + beta_lose. Penalty only applied when the per-group reward
  # std > std_threshold; empty winner set => no penalty. Subtracted from the
  # reward *before* filter_groups / advantage.
  tool_penalty:
    enable: false
    alpha_win: 0.0
    alpha_lose: 0.0
    beta_lose: 0.0
    winner_threshold: 1.0
    std_threshold: 0.0
  # Same anchored-count mechanism, but on the number of doc_ids each rollout
  # emits in its <answer> (num_answer_docs from grpo/reward.py). Winners that
  # answer with many docs relative to the per-group winner mean get docked,
  # discouraging the policy from padding the answer list to game recall.
  # Stacks additively with tool_penalty on the same base reward.
  answer_doc_penalty:
    enable: false
    alpha_win: 0.00
    alpha_lose: 0.0
    beta_lose: 0.0
    winner_threshold: 1.0
    std_threshold: 0.0

actor_rollout_ref:
  hybrid_engine: true
  model:
    # model_merger.sh writes HF under this dir; Megatron dist is under <this>/dist_ckpt/ (see scripts/model_merger.py).
    # HF load: use_dist_checkpointing: false + vanilla_mbridge (current actor/ref below).
    # MCore dist load: use_dist_checkpointing: true, dist_checkpointing_path: checkpoints/qwen3_5_35b_TP2_EP8_PP1/dist_ckpt, keep model.path here for tokenizer/config.
    path: Qwen/Qwen3.5-35B-A3B
    use_remove_padding: false  # GatedDeltaNet (SSM layers in Qwen3.5-MoE) does not support packed sequences
    enable_gradient_checkpointing: true
    trust_remote_code: true
    # WARNING ... Recommend to disable use_fused_kernels since the fused kernel's performance is broken for triton>=3.3
    # Unless you are using a very old version of triton < 3.3
    # use_fused_kernels: true                # NEW: fused log_prob + entropy, avoids the .clone()
    # fused_kernel_options:
    #   impl_backend: torch                  # safe default; switch to "triton" only if your triton<3.3


  actor:
    # GSPO knobs
    policy_loss:
      loss_mode: gspo
    loss_agg_mode: seq-mean-token-mean
    clip_ratio_low: 3.0e-4
    clip_ratio_high: 4.0e-4
    clip_ratio_c: 10.0

    optim:
      lr: 5.0e-7                       # full fine-tune LR (recipe default)
      weight_decay: 0.0
      lr_decay_style: cosine           # Megatron uses lr_decay_style (not warmup_style)
      lr_warmup_steps_ratio: 0.03
      min_lr: 1.0e-7                   # 10% of peak LR (Megatron expects absolute min_lr)
      clip_grad: 1.0
      use_checkpoint_opt_param_scheduler: true   # restore num_steps from ckpt so warmup isn't replayed
      override_optimizer_config:
        optimizer_offload_fraction: 1
        overlap_cpu_optimizer_d2h_h2d: true
        use_precision_aware_optimizer: true
        optimizer_cpu_offload: true
    ppo_mini_batch_size: 32            # 4 grad updates / batch (128 / 32)
    use_dynamic_bsz: false
    ppo_micro_batch_size_per_gpu: 1
    # ppo_max_token_len_per_gpu: 20480    # using for dynamic batching
    use_kl_loss: false                 # GSPO recipe drops the KL anchor
    entropy_coeff: 0.0

    megatron:
      # WARNING: Qwen3.5/Qwen3-Next has num_key_value_heads=2 with attention_output_gate=True.
      # Megatron's get_query_key_value_tensors slices `query` down when
      # num_query_groups < tp_size but does NOT apply the same slice to `gate`,
      # so `_apply_output_gate` crashes with `gate.view(*x.shape)` (gate is
      # tp_size/num_kv_heads× larger than x). Keep TP <= num_kv_heads (=2).
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 8    
      expert_tensor_parallel_size: 1
      param_offload: true
      grad_offload: true
      # Required whenever use_dist_checkpointing is true (verl does not infer this from model.path).
      # Default merger layout: scripts/model_merger.py writes MCore dist under <model.path>/dist_ckpt/
      dist_checkpointing_path: checkpoints/qwen3_5_35b_TP2_EP8_PP1/dist_ckpt
      use_dist_checkpointing: true
      dist_ckpt_optim_fully_reshardable: false
      optimizer_offload: true
      use_mbridge: true
      vanilla_mbridge: true
      use_remove_padding: false        # GatedDeltaNet (SSM) does not support packed sequences;
      dtype: bfloat16
      override_transformer_config:
        # moe_router_dtype: fp32
        # moe_permute_fusion: true
        recompute_method: uniform
        attention_backend: auto
        recompute_granularity: full
        recompute_num_layers: 1
        apply_rope_fusion: false   # mbridge/qwen3_5 absolute-RoPE asserts apply_rope_fusion is False

  rollout:
    name: vllm
    mode: async                        # AgentLoop requires async rollout
    n: 8                               # G — group size
    temperature: 1.0
    top_p: 0.8
    top_k: -1
    do_sample: true
    prompt_length: 2048   # initial prompt_ids; SBOL multi-turn dialogs reach ~1550 tok
    response_length: 16000  # trimmed from 28000 to cap worst-case LM-head logits memory in the actor backward (q99 rollout ≈26887 tok; longest 1% get truncated)
    gpu_memory_utilization: 0.45   # lowered from 0.50 to leave more headroom for the Megatron actor backward on GPU 0
    max_num_seqs: 16                # reduced from 16 to keep KV cache footprint small at the higher utilisation
    tensor_model_parallel_size: 2      # vLLM TP
    enforce_eager: false
    free_cache_engine: true
    max_model_len: 18488   # response_length (16000) + prompt_length (2048)
    dtype: bfloat16
    # log_prob_use_dynamic_bsz: false
    log_prob_micro_batch_size_per_gpu: 1
    # log_prob_max_token_len_per_gpu: 20480   # match actor budget to keep entropy logits in memory
    checkpoint_engine:
      update_weights_bucket_megabytes: 4096
    agent:
      agent_loop_config_path: configs/agent_loop_registry.yaml
      num_workers: 64
    multi_turn:
      enable: true
      max_assistant_turns: 6
      max_user_turns: 0
      tool_response_truncate_side: left
      max_tool_response_length: 10240 # character length (len(string)).
    val_kwargs:
      n: 1
      temperature: 0.1
      top_p: 0.8

  ref:
    log_prob_use_dynamic_bsz: false
    log_prob_micro_batch_size_per_gpu: 1
    # log_prob_max_token_len_per_gpu: 20480   # ref also needs the smaller budget
    megatron:
      # See note in actor.megatron above: TP must be <= num_key_value_heads (=2).
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 8
      expert_tensor_parallel_size: 1
      param_offload: true
      use_mbridge: true

reward:
  custom_reward_function:
    path: grpo/reward.py
    name: compute_score
    reward_kwargs:
      # r = alpha * NDCG@k + (1 - alpha) * F_beta(output)
      #   - length_penalty + format_penalty
      #   + answer_bonus * [stopped_reason == "answer"]
      ndcg_k: 8
      alpha: 1.0
      f_beta: 4.0
      length_alpha: 0.0              # length penalty is OPTIONAL; set >0 to enable
      length_target_tokens: 8192
      parse_error_penalty: 0.0
      answer_bonus: 0.0             # epsilon in [0.02, 0.05]; nudge model to emit `answer`

agent_loop:
  retrieval_react:
    # Empty → no filtering; tools come entirely from get_tool_schemas(prompt_version).
    # v2_search_only rows get [search]; v2 (ckr) rows get [search, get_neighbours].
    tool_names: ""
    tool_server_url: http://localhost:8100
    # Per-row routing: each parquet row's extra_info.source (written by
    # grpo/data_prep.py from data_source) pins its searches to the matching
    # index, so MuSiQue rows hit the musique index and SBOL rows hit sbol.
    # default_source is only the fallback for rows that carry no source; leave
    # empty to defer to the tool server's index.default_source.
    default_source: ""
    tool_timeout_s: 30
    max_turns: 12
    max_tool_calls: 3
    # When true, the tool-call budget is surfaced to the policy: each tool
    # response is suffixed with `[calls used: N/max_tool_calls]`, and once the
    # budget is spent the rollout is NOT truncated — the model gets one final
    # turn (with an explicit nudge) to emit its <answer>. When false, hitting
    # max_tool_calls ends the rollout immediately (stopped_reason=max_tool_calls).
    tool_budget_feedback: true
    top_k_default: 5
    top_k_max: 50
    # Per-passage cap (tokenizer token count), applied to each hit's text
    # BEFORE max_tool_response_length's total-response char budget. Keeps any
    # single long passage from crowding out the rest of top_k, and bounds the
    # per-turn context growth deterministically. 0 disables.
    max_passage_tokens: 512
    # max_response_tokens: 5120
    # Abort the rollout worker after this many consecutive tool-server failures
    # instead of silently returning empty results and degrading rewards.
    # Set to 0 to disable (old behaviour).
    # Sized for ~128 agent workers: a single brownout (e.g. weight update
    # spike) can produce a short burst of timeouts across many workers at
    # once. Pair with the singleflight /reload on the server (tool_server/main.py).
    max_consecutive_tool_errors: 5
    # Replace doc_ids with small per-rollout integers (0,1,2… by first
    # appearance) in tool output; the model answers with ints and they are
    # mapped back to doc_ids for reward/NDCG. Must match the eval harness'
    # agent.use_id_map so train and eval stay consistent.
    use_id_map: true

trainer:
  project_name: agentic_retrieval_gspo
  experiment_name: qwen3_moe_a3b_musique
  total_epochs: 2
  total_training_steps: null
  nnodes: 1
  n_gpus_per_node: 8
  save_freq: 10
  max_actor_ckpt_to_keep: 1
  test_freq: 5
  val_trajectory_dir: trajectories_data/gspo_qwen3_moe
  logger: ['console', 'wandb']
  default_local_dir: checkpoints/gspo_qwen3_moe/
  val_before_train: true
  balance_batch: true
  critic_warmup: 0

index:
  grep_max_concurrency: 4     # default 4; lower → less GIL pressure on search
  grep_timeout_s: 15.0         # default 10.0
  grep_max_text_chars: 4096   
  reload_cooldown_s: 30.0     

ti_to_check:
  every_n_steps: 50
  num_samples: 4
